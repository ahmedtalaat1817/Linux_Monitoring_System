# Linux Monitoring System - Shared Configuration
# Sourced by every module. Plain bash variable assignments only:
#   no spaces around '=', no commands, no logic.

# ---------- Paths ----------
LOG_DIR="/var/log/sysmonitor"
LOG_FILE="$LOG_DIR/system.log"
ALERT_LOG="$LOG_DIR/alerts.log"
REPORT_DIR="$LOG_DIR/reports"
BASELINE_DIR="./baseline"

# ---------- Thresholds (percent for CPU/RAM/DISK) ----------
CPU_WARN_THRESHOLD=70
CPU_CRIT_THRESHOLD=90

RAM_WARN_THRESHOLD=75
RAM_CRIT_THRESHOLD=90

DISK_WARN_THRESHOLD=80
DISK_CRIT_THRESHOLD=95

# Load average is unitless — compared as a float.
LOAD_WARN_THRESHOLD=2
LOAD_CRIT_THRESHOLD=4

# ---------- Services to watch (space-separated) ----------
# services.sh tries known aliases per distro:
#   "cron" works on both Debian/Kali (cron) and Red Hat (crond)
#   "sshd" works on both (binary is sshd everywhere)
MONITORED_SERVICES="sshd cron"

# ---------- Network ----------
SUSPICIOUS_PORTS="23 2323 4444 5555 31337"

# ---------- Behavior ----------
REFRESH_INTERVAL=5            # seconds between dashboard refreshes
MAX_LOG_SIZE_MB=50
DEFAULT_TAIL_LINES=20
